---
name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set Up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build Image
        run: docker build -t pedant:ci .

      - name: Run E2E Scenarios
        run: PEDANT_IMAGE=pedant:ci .github/workflows/fixtures/run.sh --all

      - name: Self-Check
        env:
          INPUT_FIX: 'false'
          INPUT_IGNORE: '.github/workflows/fixtures'
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -e GITHUB_ACTIONS \
            -e INPUT_FIX \
            -e INPUT_IGNORE \
            pedant:ci
