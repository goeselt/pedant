---
name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read # Required to check out the repository.
      pull-requests: write # Required to post/update PR comments.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Set Up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Set Up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Verify Node Toolchain Lockfile Sync
        working-directory: tools/node
        run: |
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code package-lock.json

      - name: Format Check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            printf 'Files need formatting:\n%s\n' "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build Image
        run: docker build -t pedant:ci .

      - name: Run E2E Scenarios
        run: PEDANT_IMAGE=pedant:ci .github/workflows/fixtures/run.sh --all

      - name: Self-Check
        id: self-check
        continue-on-error: true
        env:
          INPUT_FIX: 'false'
          INPUT_IGNORE: '.github/workflows/fixtures'
          INPUT_SUMMARY_FILE: 'pedant-self-check.md'
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/work" \
            -e GITHUB_ACTIONS -e INPUT_FIX -e INPUT_IGNORE -e INPUT_SUMMARY_FILE pedant:ci

      - name: Publish Self-Check Report
        if: always()
        uses: goeselt/remark@c2de02a492be4f6f11cd258c86e273a77186c86b # v1.0.5
        with:
          comment-key: pedant-self-check
          body-file: pedant-self-check.md
          skip-unchanged: true

      - name: Fail On Self-Check Findings
        if: steps.self-check.outcome == 'failure'
        run: exit 1
