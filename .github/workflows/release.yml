---
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - id: app
        name: Generate App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_KEY }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # intent release needs full history to find the previous release tag
          token: ${{ steps.app.outputs.token }}
          persist-credentials: false

      - id: intent
        name: Intent Release
        uses: goeselt/intent@10ce9d916bb1af60c48ff1bc03a99348aede7f1a # v1.1.4
        with:
          initial-version: '1.0.0'

      - name: Set Up Node
        if: steps.intent.outputs.release-needed == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Bump Node Toolchain Version
        if: steps.intent.outputs.release-needed == 'true'
        working-directory: tools/node
        env:
          VERSION: ${{ steps.intent.outputs.next-version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Set Up Docker Buildx
        if: steps.intent.outputs.release-needed == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log In to GHCR
        if: steps.intent.outputs.release-needed == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Image Metadata
        id: meta
        if: steps.intent.outputs.release-needed == 'true'
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.intent.outputs.next-version }}
            type=raw,value=${{ steps.intent.outputs.minor-version }}
            type=raw,value=${{ steps.intent.outputs.major-version }}
            type=raw,value=latest

      - name: Build and Push
        id: build
        if: steps.intent.outputs.release-needed == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest Build Provenance
        if: steps.intent.outputs.release-needed == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/goeselt/pedant
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Pin action.yml
        if: steps.intent.outputs.release-needed == 'true'
        env:
          VERSION: ${{ steps.intent.outputs.next-version }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if ! printf '%s' "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            printf 'error: invalid version format: %s\n' "${VERSION}" >&2
            exit 1
          fi
          # Handles both the old tag-only format and the new tag@digest format.
          sed -i "s|image: docker://ghcr.io/goeselt/pedant:.*|image: docker://ghcr.io/goeselt/pedant:${VERSION}@${DIGEST}|" action.yml

      - name: Commit
        if: steps.intent.outputs.release-needed == 'true'
        uses: goeselt/scribe@4628c4f2ebb92e31e989b220b1a82ba5132d0a3f # v1.2.1
        with:
          files: |
            action.yml
            tools/node/package.json
            tools/node/package-lock.json
          message: 'chore(version): release v${{ steps.intent.outputs.next-version }}'
          github-token: ${{ steps.app.outputs.token }}
          git-user-name: ${{ vars.RELEASE_SIGNING_USER }}
          git-user-email: ${{ vars.RELEASE_SIGNING_EMAIL }}
          signing-key: ${{ secrets.RELEASE_SIGNING_KEY }}

      - name: Ship
        if: steps.intent.outputs.release-needed == 'true'
        uses: goeselt/dispatch@537bfa0724a8de8b2a8e282458944a9cf368f740 # v1.2.3
        with:
          release-tag: ${{ steps.intent.outputs.release-tag }}
          major-tag: ${{ steps.intent.outputs.major-tag }}
          minor-tag: ${{ steps.intent.outputs.minor-tag }}
          github-token: ${{ steps.app.outputs.token }}
          git-user-name: ${{ vars.RELEASE_SIGNING_USER }}
          git-user-email: ${{ vars.RELEASE_SIGNING_EMAIL }}
          signing-key: ${{ secrets.RELEASE_SIGNING_KEY }}
