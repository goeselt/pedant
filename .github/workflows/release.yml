---
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read # Least-privilege default

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # Required to push the release commit and tag.
      packages: write # Required to push the release image to GHCR.
      id-token: write # Required to create a SLSA attestation for the release.
      attestations: write # Required to create a SLSA attestation for the release.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history needed to find the previous release tag

      - id: intent
        name: Intent Release
        uses: goeselt/intent@0ab5bbaa2e12d54e405da9e9664ac3328f2c274a # v1.2.3
        with:
          initial-version: '1.0.0'

      - name: Set Up Node
        if: steps.intent.outputs.release-needed == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Bump Node Toolchain Version
        if: steps.intent.outputs.release-needed == 'true'
        working-directory: tools/node
        env:
          VERSION: ${{ steps.intent.outputs.next-version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Set Up Docker Buildx
        if: steps.intent.outputs.release-needed == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log In to Registry
        if: steps.intent.outputs.release-needed == 'true'
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Image Metadata
        id: meta
        if: steps.intent.outputs.release-needed == 'true'
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.intent.outputs.next-version }}
            type=raw,value=${{ steps.intent.outputs.minor-version }}
            type=raw,value=${{ steps.intent.outputs.major-version }}
            type=raw,value=latest

      - name: Build and Push
        id: build
        if: steps.intent.outputs.release-needed == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest Build Provenance
        if: steps.intent.outputs.release-needed == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Pin
        if: steps.intent.outputs.release-needed == 'true'
        env:
          VERSION: ${{ steps.intent.outputs.next-version }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if ! printf '%s' "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            printf 'error: invalid version format: %s\n' "${VERSION}" >&2
            exit 1
          fi
          # Handles both the old tag-only format and the new tag@digest format.
          sed -i "s|image: docker://ghcr.io/goeselt/pedant:.*|image: docker://ghcr.io/goeselt/pedant:${VERSION}@${DIGEST}|" action.yml

      - name: Commit
        if: steps.intent.outputs.release-needed == 'true'
        uses: goeselt/scribe@732387b7af0ebcabc4653253cb5865a31a3cd485 # v1.2.2
        with:
          files: |
            action.yml
            tools/node/package.json
            tools/node/package-lock.json
          message: 'chore: bump ${{ steps.intent.outputs.release-tag }}'
          github-token: ${{ secrets.CONTENT_WRITE_PAT }}
          git-user-name: ${{ secrets.RELEASE_SIGNING_USER }}
          git-user-email: ${{ secrets.RELEASE_SIGNING_EMAIL }}
          signing-key: ${{ secrets.RELEASE_SIGNING_KEY }}

      - name: Release
        if: steps.intent.outputs.release-needed == 'true'
        uses: goeselt/dispatch@177d405019f83bf8728e3a132e2b2565d6eacd47 # v1.3.5
        with:
          release-tag: ${{ steps.intent.outputs.release-tag }}
          major-tag: ${{ steps.intent.outputs.major-tag }}
          minor-tag: ${{ steps.intent.outputs.minor-tag }}
          git-user-name: ${{ secrets.RELEASE_SIGNING_USER }}
          git-user-email: ${{ secrets.RELEASE_SIGNING_EMAIL }}
          signing-key: ${{ secrets.RELEASE_SIGNING_KEY }}
