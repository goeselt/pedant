---
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - id: app
        name: Generate App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_KEY }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # bumpkin needs full history to find the previous release tag
          token: ${{ steps.app.outputs.token }}

      - id: bumpkin
        name: Resolve Version
        uses: goeselt/bumpkin@8e5d31105440aa42cd53d50b22c954be38bc2dd0 # v1.0.1
        with:
          initial-version: '1.0.0'

      - name: Extract Version Parts
        id: ver
        if: steps.bumpkin.outputs.release-needed == 'true'
        env:
          VERSION: ${{ steps.bumpkin.outputs.next-version }}
        run: |
          {
            printf 'major=%s\n' "${VERSION%%.*}"
            printf 'minor=%s\n' "${VERSION%.*}"
          } >>"$GITHUB_OUTPUT"

      - name: Set Up Docker Buildx
        if: steps.bumpkin.outputs.release-needed == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log In to GHCR
        if: steps.bumpkin.outputs.release-needed == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Image Metadata
        id: meta
        if: steps.bumpkin.outputs.release-needed == 'true'
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.bumpkin.outputs.next-version }}
            type=raw,value=${{ steps.ver.outputs.minor }}
            type=raw,value=${{ steps.ver.outputs.major }}
            type=raw,value=latest

      - name: Build and Push
        id: build
        if: steps.bumpkin.outputs.release-needed == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest Build Provenance
        if: steps.bumpkin.outputs.release-needed == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/goeselt/pedant
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Pin action.yml
        if: steps.bumpkin.outputs.release-needed == 'true'
        env:
          VERSION: ${{ steps.bumpkin.outputs.next-version }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if ! printf '%s' "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            printf 'error: invalid version format: %s\n' "${VERSION}" >&2
            exit 1
          fi
          # Handles both the old tag-only format and the new tag@digest format.
          sed -i "s|image: docker://ghcr.io/goeselt/pedant:.*|image: docker://ghcr.io/goeselt/pedant:${VERSION}@${DIGEST}|" action.yml

      - name: Commit Pin
        if: steps.bumpkin.outputs.release-needed == 'true'
        uses: goeselt/scribe@2dde3d76f0a8c6de2974c223b6dd562756fa872e # v1.1.0
        with:
          files: action.yml
          message: 'chore(pin): action.yml to v${{ steps.bumpkin.outputs.next-version }}'
          git-user-name: ${{ vars.RELEASE_SIGNING_USER }}
          git-user-email: ${{ vars.RELEASE_SIGNING_EMAIL }}
          signing-key: ${{ secrets.RELEASE_SIGNING_KEY }}

      - name: Ship
        if: steps.bumpkin.outputs.release-needed == 'true'
        uses: goeselt/shipit@54c7a651030061bb138975718850d0248ac683a9 # v1.0.2
        with:
          release-tag: ${{ steps.bumpkin.outputs.release-tag }}
          major-tag: ${{ steps.bumpkin.outputs.major-tag }}
          minor-tag: ${{ steps.bumpkin.outputs.minor-tag }}
          github-token: ${{ steps.app.outputs.token }}
          git-user-name: ${{ vars.RELEASE_SIGNING_USER }}
          git-user-email: ${{ vars.RELEASE_SIGNING_EMAIL }}
          signing-key: ${{ secrets.RELEASE_SIGNING_KEY }}
