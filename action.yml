---
name: Pedant - Lint and Format
description: Lint and format code in a Git repository using pedant.
author: goeselt

branding:
  icon: check-circle
  color: purple

inputs:
  fix:
    description: >
      Apply auto-fixes to files in the workspace. Set to 'true' to enable. Fixable tools (prettier, shfmt, ...) rewrite files in-place; the caller is responsible for committing any changes.
    default: 'false'
  paths:
    description: >
      Restrict the scan to these workspace-relative paths or files, one per line. Omit to scan the entire repository.
    default: ''
  ignore:
    description: >
      Exclude these workspace-relative paths or files from the scan, one per line. Omit to exclude nothing.
    default: ''
  tool-timeout:
    description: >
      Maximum wall-clock duration for one tool invocation group, for example 30s, 5m, or 1h.
    default: 10m
  summary-markdown:
    description: >
      Write a Markdown summary to stdout. Set to 'true' to enable.
    default: 'false'
  summary-file:
    description: >
      Write the generated Markdown summary to this workspace-relative file.
    default: ''
  summary-github-step:
    description: >
      Append the generated Markdown summary to the GitHub Actions step summary. Set to 'true' to enable.
    default: 'false'

outputs:
  status:
    description: >
      Overall result of the run: 'pass', 'fail', or 'error'.
  total-findings:
    description: >
      Total number of findings across all tools.
  files-discovered:
    description: >
      Number of files discovered and checked.
  tools-run:
    description: >
      Number of tools that executed (not skipped).
  tools-skipped:
    description: >
      Number of tools skipped (no matching files or skip condition met).
  summary:
    description: >
      Markdown summary of the pedant run. Can be used directly as a PR comment body or passed to a step summary without writing an intermediate file.

runs:
  using: docker
  # Image tag is updated automatically by the release workflow on every push.
  # Inputs are passed to entrypoint.sh as INPUT_* environment variables automatically
  # by the Actions runner -- no args: list needed.
  image: docker://ghcr.io/goeselt/pedant:1.2.6@sha256:fd610b7116f96acc65159048925d54f772fe5aaaa08f86f958b62066334f11a1
